<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Felix &amp; Merjorie — Wedding RSVP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Imperial+Script&family=Libre+Bodoni:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- floating petals -->
<div class="petals" aria-hidden="true"></div>

<!-- 1. HERO -->
<header class="hero" id="hero">

  <img class="asset ribbon-left"
       src="ribbon-left.png"
       alt=""
       aria-hidden="true"
       onerror="this.classList.add('asset-missing')">

  <div class="hero-content fade-up">

    <div class="hero-music" id="music" aria-label="Wedding music player">

      <p class="hero-invite-label">You are invited!</p>

      <div class="envelope-stage" aria-hidden="true">

        <img class="asset envelope-backdrop-flower"
             src="envelope-flower.png"
             alt=""
             onerror="this.classList.add('asset-missing')">

        <img class="asset music-envelope"
             src="music-envelope.png"
             alt=""
             onerror="this.classList.add('asset-missing')">

        <span class="seal-shimmer"></span>

      </div>

      <div class="waveform" id="waveform" aria-hidden="true"></div>

      <!-- Controls stay exactly the same -->

      <p class="player-caption">
        Click to play our playlist and set the tone for our special day.
      </p>

      <audio
        id="weddingAudio"
        src="wedding-song.mp3"
        preload="auto"
        loop>
      </audio>

    </div>

    <a href="#invitation" class="scroll-cue">
      <span>Scroll to begin</span>

      <svg width="18" height="28" viewBox="0 0 18 28" fill="none">
        <line
          x1="9"
          y1="0"
          x2="9"
          y2="22"
          stroke="var(--rose-gold)"
          stroke-width="1.5"/>

        <path
          d="M2 16 L9 24 L16 16"
          stroke="var(--rose-gold)"
          stroke-width="1.5"
          fill="none"/>
      </svg>

    </a>

  </div>

</header>

<!-- Divider ribbon -->

<section class="invitation-section fade-up" id="invitation">

  <div class="hero-content">

    <p class="eyebrow">Together with their families</p>

    <h1 class="couple-names" id="coupleNames">
      Felix &amp; Merjorie
    </h1>

    <p class="invite-line">
      invite you to their wedding celebration
    </p>

    <div
      class="date-block"
      aria-label="Saturday, November 07, 2026 at 4:00 PM">

      <span class="date-month" id="dateMonth">
        NOVEMBER
      </span>

      <span class="date-day" id="dateDay">
        07
      </span>

      <span class="date-year" id="dateYear">
        2026
      </span>

      <span class="date-meta" id="dateMeta">
        SATURDAY &nbsp;|&nbsp; 4:00 PM
      </span>

    </div>

    <p class="venue-line" id="venueLine">
      At the Ezdan Palace Hotel, Qatar
    </p>

  </div>

</section>

<!-- Venue -->

<section class="venue-feature fade-up" id="venue">

  <div class="venue-image-wrap">

    <img
      src="venue.jpg"
      alt="Wedding venue"
      class="venue-image asset"
      onerror="this.classList.add('asset-missing')">

  </div>

</section>

<!-- Details -->

<section class="details-section fade-up" id="details">

  <img
    class="asset floral-bottom-left"
    src="floral-bottom-left.png"
    alt=""
    aria-hidden="true"
    onerror="this.classList.add('asset-missing')">

  <!-- everything else remains unchanged -->

</section>

<!-- ...rest of your HTML stays exactly the same... -->

<script src="main.js"></script>

</body>
</html>
